<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArguMind — AI Debate &amp; Fact-Check Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #F5F0E8; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes marquee    { from { transform: translateX(0); }        to { transform: translateX(-33.333%); } }
    @keyframes marqueeRev { from { transform: translateX(-33.333%); } to { transform: translateX(0); } }
    textarea, button, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #F5F0E8; border-left: 2px solid #111; }
    ::-webkit-scrollbar-thumb { background: #111; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const BACKEND = 'http://localhost:8000';

    // ─── Shared primitives ────────────────────────────────────────────────────────

    const BrainIcon = ({ size = 40 }) => (
      <div style={{
        width: size, height: size,
        background: '#06B6D4', border: '2px solid #111',
        display: 'grid', gridTemplateColumns: 'repeat(3,1fr)',
        gap: 3, padding: 8, flexShrink: 0,
      }}>
        {Array(9).fill(0).map((_, i) => (
          <div key={i} style={{ background: i % 2 === 0 ? '#111' : 'transparent', borderRadius: 1 }} />
        ))}
      </div>
    );

    const BrutalButton = ({ label, variant = 'primary', size = 'md', onClick, disabled, style: extra = {} }) => {
      const bgMap    = { primary: '#06B6D4', secondary: '#F5F0E8', danger: '#1E1B4B' };
      const colorMap = { primary: '#fff',    secondary: '#111',    danger: '#06B6D4' };
      const pad = size === 'lg' ? '18px 36px' : '10px 22px';
      const fs  = size === 'lg' ? 22 : 17;
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          style={{
            background: disabled ? '#ccc' : bgMap[variant],
            color: disabled ? '#888' : colorMap[variant],
            border: '4px solid #111',
            padding: pad, fontFamily: 'Bangers, cursive', fontSize: fs,
            letterSpacing: '0.05em', textTransform: 'uppercase',
            boxShadow: disabled ? 'none' : '8px 8px 0 0 #111',
            cursor: disabled ? 'not-allowed' : 'pointer',
            transition: 'all 75ms',
            display: 'inline-flex', alignItems: 'center', gap: 8,
            opacity: disabled ? 0.5 : 1, ...extra,
          }}
          onMouseEnter={e => { if (!disabled) { e.currentTarget.style.transform = 'translate(-2px,-2px)'; e.currentTarget.style.boxShadow = '12px 12px 0 0 #111'; } }}
          onMouseLeave={e => { if (!disabled) { e.currentTarget.style.transform = 'translate(0,0)'; e.currentTarget.style.boxShadow = '8px 8px 0 0 #111'; } }}
          onMouseDown={e => { if (!disabled) { e.currentTarget.style.transform = 'translate(4px,4px)'; e.currentTarget.style.boxShadow = '0 0 0 0 #111'; } }}
          onMouseUp={e => { if (!disabled) { e.currentTarget.style.transform = 'translate(-2px,-2px)'; e.currentTarget.style.boxShadow = '12px 12px 0 0 #111'; } }}
        >{label}</button>
      );
    };

    const AgentBadge = ({ role }) => {
      const map = {
        proponent:    { bg: '#06B6D4', color: '#fff',     label: 'PROPONENT' },
        critic:       { bg: '#1E1B4B', color: '#06B6D4',  label: 'CRITIC' },
        analyst:      { bg: '#A7F3D0', color: '#111',     label: 'ANALYST' },
        fact_checker: { bg: '#C084FC', color: '#fff',     label: 'FACT-CHECKER' },
      };
      const cfg = map[role] || { bg: '#eee', color: '#111', label: role.toUpperCase() };
      return (
        <span style={{
          background: cfg.bg, color: cfg.color,
          border: '2px solid #111', padding: '3px 10px',
          fontFamily: 'Bangers, cursive', fontSize: 13,
          letterSpacing: '0.1em', textTransform: 'uppercase', display: 'inline-block',
        }}>{cfg.label}</span>
      );
    };

    const MessageCard = ({ message, visible }) => {
      const stripColor = {
        proponent:    '#06B6D4',
        critic:       '#1E1B4B',
        analyst:      '#A7F3D0',
        fact_checker: '#C084FC',
      }[message.role] || '#111';
      const isFC = message.role === 'fact_checker';
      return (
        <div style={{
          background: isFC ? '#FAF5FF' : message.role === 'critic' ? '#F5F8FF' : '#fff',
          border: isFC ? '6px solid #111' : '4px solid #111',
          borderLeft: `8px solid ${stripColor}`,
          boxShadow: isFC ? '12px 12px 0 0 #111' : '8px 8px 0 0 #111',
          padding: 24, marginBottom: 24,
          opacity: visible ? 1 : 0, transition: 'opacity 400ms ease',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
            <AgentBadge role={message.role} />
            <span style={{
              background: '#111', color: '#06B6D4', fontFamily: 'Bangers, cursive',
              fontSize: 12, letterSpacing: '0.08em', padding: '2px 8px', textTransform: 'uppercase',
            }}>
              {message.round === 0 ? 'OPENING' : `ROUND ${message.round}`}
            </span>
          </div>
          <div style={{ fontSize: 15, lineHeight: 1.7, fontWeight: 500, whiteSpace: 'pre-wrap', color: '#111' }}>
            {message.content}
          </div>
        </div>
      );
    };

    const AppHeader = ({ onBack }) => (
      <header style={{
        position: 'sticky', top: 0, zIndex: 50,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 32px', background: '#F5F0E8', borderBottom: '4px solid #111',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <BrainIcon size={40} />
          <div>
            <div style={{ fontFamily: 'Bangers, cursive', fontSize: 28, fontStyle: 'italic', letterSpacing: '0.05em', color: '#111', lineHeight: 1 }}>
              ARGUMIND
            </div>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.15em', color: 'rgba(0,0,0,0.4)', textTransform: 'uppercase' }}>
              Debate. Analyse. Verify.
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {onBack && (
            <button onClick={onBack} style={{
              background: '#111', color: '#F5F0E8', border: '2px solid #111',
              padding: '6px 16px', fontFamily: 'Bangers, cursive', fontSize: 15,
              letterSpacing: '0.05em', textTransform: 'uppercase', cursor: 'pointer',
            }}
              onMouseEnter={e => e.currentTarget.style.background = '#06B6D4'}
              onMouseLeave={e => e.currentTarget.style.background = '#111'}
            >← NEW DEBATE</button>
          )}
          <span style={{
            background: '#1E1B4B', color: '#06B6D4', border: '2px solid #111',
            padding: '4px 12px', fontFamily: 'sans-serif', fontWeight: 700, fontSize: 13, textTransform: 'uppercase',
          }}>4 AGENTS</span>
          <div style={{ width: 1, height: 24, background: '#111' }} />
          <span style={{
            background: '#111', color: '#F5F0E8', border: '2px solid #111',
            padding: '4px 12px', fontFamily: 'sans-serif', fontWeight: 700, fontSize: 13,
            textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#06B6D4', animation: 'pulse 2s infinite' }} />
            LIVE
          </span>
        </div>
      </header>
    );

    // ─── Landing — Hero ───────────────────────────────────────────────────────────

    const HeroSection = ({ onOpen }) => (
      <section style={{
        position: 'relative', minHeight: '92vh',
        background: '#F5F0E8',
        backgroundImage: 'radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px)',
        backgroundSize: '24px 24px',
        display: 'flex', alignItems: 'center',
        padding: '80px 80px', overflow: 'hidden',
      }}>
        {/* Navy hero box */}
        <div style={{
          background: '#1E1B4B', border: '6px solid #111',
          padding: '52px', boxShadow: '16px 16px 0 0 #111',
          transform: 'rotate(-1deg)', maxWidth: 640, position: 'relative', zIndex: 10,
        }}>
          <div style={{ fontFamily: 'Bangers, cursive', lineHeight: 1.02, marginBottom: 8 }}>
            <div style={{ fontSize: 72, color: '#F5F0E8' }}>4 AI AGENTS.</div>
            <div style={{ fontSize: 72, color: '#F5F0E8', fontStyle: 'italic' }}>DEBATE.</div>
            <div style={{ fontSize: 72, color: '#06B6D4', fontStyle: 'italic', textShadow: '3px 3px 0 #111' }}>FACT-CHECK.</div>
            <div style={{ fontSize: 72, color: '#F5F0E8', fontStyle: 'italic', textShadow: '3px 3px 0 #06B6D4' }}>DECIDE.</div>
          </div>
          <div style={{
            background: 'rgba(255,255,255,0.07)', border: '4px solid rgba(255,255,255,0.2)',
            padding: '22px 26px', marginTop: 22,
            fontSize: 17, fontWeight: 500, lineHeight: 1.6, color: '#F5F0E8',
          }}>
            4 specialized AI agents argue, analyse, and fact-check your topic — you leave with a more reliable, multi-perspective answer.
          </div>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            background: '#06B6D4', border: '2px solid #111',
            padding: '8px 16px', marginTop: 20,
          }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#fff', animation: 'pulse 2s infinite', flexShrink: 0 }} />
            <span style={{ fontFamily: 'Bangers, cursive', fontSize: 14, letterSpacing: '0.15em', textTransform: 'uppercase', color: '#fff' }}>MULTI-AGENT PIPELINE</span>
          </div>
          <div style={{ display: 'flex', gap: 16, marginTop: 20, flexWrap: 'wrap' }}>
            <BrutalButton variant="primary" size="lg" label="START A DEBATE →" onClick={onOpen} />
            <BrutalButton variant="secondary" size="lg" label="MEET THE AGENTS" onClick={() => {
              document.getElementById('agent-roster')?.scrollIntoView({ behavior: 'smooth' });
            }} />
          </div>
        </div>

        {/* Comic bursts */}
        <div style={{ position: 'absolute', top: 60, right: 80, transform: 'rotate(-8deg)', zIndex: 5 }}>
          <div style={{
            width: 160, height: 160, borderRadius: '50%',
            background: '#06B6D4', border: '4px solid #111', boxShadow: '6px 6px 0 0 #111',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Bangers, cursive', fontSize: 44, color: '#fff',
          }}>BAM!</div>
        </div>
        <div style={{ position: 'absolute', top: 200, right: 310, transform: 'rotate(6deg)', zIndex: 6 }}>
          <div style={{
            width: 168, height: 130, background: '#1E1B4B', border: '4px solid #111', boxShadow: '6px 6px 0 0 #111',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Bangers, cursive', fontSize: 38, color: '#06B6D4', gap: 4,
          }}>
            <div>POW!</div>
            <div style={{ fontSize: 11, fontFamily: 'sans-serif', fontWeight: 700, letterSpacing: 1, color: '#F5F0E8' }}>4 Agents. One Truth.</div>
          </div>
        </div>
        <div style={{ position: 'absolute', top: 340, right: 72, transform: 'rotate(-4deg)', zIndex: 5 }}>
          <div style={{
            width: 150, height: 150, background: '#C084FC', border: '4px solid #111', boxShadow: '6px 6px 0 0 #111',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Bangers, cursive', fontSize: 40, color: '#fff', gap: 8,
          }}>
            <div>ZAP!</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 3 }}>
              {['#06B6D4','#1E1B4B','#C084FC','#F5F0E8'].map((c, i) => (
                <div key={i} style={{ width: 18, height: 18, background: c, border: '2px solid #111' }} />
              ))}
            </div>
          </div>
        </div>
      </section>
    );

    // ─── Landing — Ticker ─────────────────────────────────────────────────────────

    const QUICK_TOPICS = [
      { label: 'AI IN COURTS',       topic: 'AI should replace human judges in courtrooms' },
      { label: 'REMOTE WORK',        topic: 'Remote work is better than office work' },
      { label: 'UBI NOW',            topic: 'Universal Basic Income should be implemented globally' },
      { label: 'SOCIAL MEDIA HARMS', topic: 'Social media does more harm than good to society' },
      { label: 'NUCLEAR IS GREEN',   topic: 'Nuclear energy is the best solution to climate change' },
      { label: 'CRYPTO DEAD?',       topic: 'Cryptocurrency has failed as a mainstream currency' },
      { label: 'FOUR-DAY WEEK',      topic: 'A four-day work week should become the global standard' },
    ];

    const Ticker = ({ onQuickTopic }) => {
      const row2 = 'ACCURACY • ANALYSIS • FACT-CHECK • DEBATE • EVIDENCE • REASONING • BALANCE • CLAIM • REBUTTAL • VERDICT • ';
      const items = [...QUICK_TOPICS, ...QUICK_TOPICS, ...QUICK_TOPICS];
      return (
        <div>
          <div style={{ background: '#111', borderTop: '4px solid #111', borderBottom: '4px solid #111', padding: '12px 0', overflow: 'hidden' }}>
            <div style={{ display: 'flex', whiteSpace: 'nowrap', animation: 'marquee 32s linear infinite' }}>
              {items.map((item, i) => (
                <button key={i} onClick={() => onQuickTopic(item.topic)}
                  style={{
                    fontFamily: 'Bangers, cursive', fontSize: 20, letterSpacing: '0.15em',
                    color: '#06B6D4', paddingRight: 32, background: 'none', border: 'none',
                    cursor: 'pointer', whiteSpace: 'nowrap',
                  }}
                  onMouseEnter={e => { e.currentTarget.style.color = '#fff'; e.currentTarget.style.textDecoration = 'underline'; }}
                  onMouseLeave={e => { e.currentTarget.style.color = '#06B6D4'; e.currentTarget.style.textDecoration = 'none'; }}
                >{item.label} •</button>
              ))}
            </div>
          </div>
          <div style={{ background: '#06B6D4', borderBottom: '4px solid #111', padding: '12px 0', overflow: 'hidden' }}>
            <div style={{ display: 'flex', whiteSpace: 'nowrap', animation: 'marqueeRev 36s linear infinite' }}>
              {[row2, row2, row2].map((s, i) => (
                <span key={i} style={{ fontFamily: 'Bangers, cursive', fontSize: 20, letterSpacing: '0.15em', color: '#1E1B4B', paddingRight: 40 }}>{s}</span>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ─── Landing — Sections ───────────────────────────────────────────────────────

    const PromptDebateShip = () => (
      <section style={{ background: '#1E1B4B', borderBottom: '4px solid #111', padding: '80px 80px 40px' }}>
        <div style={{
          background: '#06B6D4', border: '4px solid #111', boxShadow: '8px 8px 0 0 #111',
          padding: '18px 32px', display: 'inline-block', transform: 'rotate(-1deg)', marginBottom: 32,
        }}>
          <span style={{ fontFamily: 'Bangers, cursive', fontSize: 54, color: '#fff', letterSpacing: '0.03em' }}>
            ARGUE. ANALYSE. VERIFY.
          </span>
        </div>
        <div style={{
          background: 'rgba(255,255,255,0.08)', border: '4px solid rgba(255,255,255,0.15)',
          padding: '24px 28px', maxWidth: 640, fontSize: 18, fontWeight: 500, lineHeight: 1.65, color: '#F5F0E8',
        }}>
          Your topic goes through 4 specialized AI agents who argue, analyse, and fact-check — producing a more reliable, balanced answer than any single model alone.
        </div>
      </section>
    );

    const AgentAvatar = ({ bg, initial, color = '#111' }) => (
      <div style={{
        width: 40, height: 40, background: bg, border: '2px solid #111',
        fontFamily: 'Bangers, cursive', fontSize: 20, color,
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
      }}>{initial}</div>
    );

    const HowWeDoIt = () => {
      const steps = [
        {
          num: '01', bg: '#F5F0E8', color: '#111',
          title: 'ENTER A SHARP TOPIC',
          body: 'One sentence. No walls of text. Your debate topic is the only input.',
          avatars: [{ bg: '#06B6D4', initial: 'A', color: '#fff' }],
        },
        {
          num: '02', bg: '#06B6D4', color: '#fff',
          title: 'AGENTS DEBATE',
          body: 'Proponent builds the strongest case. Critic dismantles every claim — round by round.',
          avatars: [{ bg: '#fff', initial: 'P', color: '#06B6D4' }, { bg: '#1E1B4B', initial: 'C', color: '#06B6D4' }],
        },
        {
          num: '03', bg: '#A7F3D0', color: '#111',
          title: 'ANALYST EVALUATES',
          body: 'The Analyst stays neutral — identifying strengths, gaps, and missing context from both sides.',
          avatars: [{ bg: '#111', initial: 'A', color: '#A7F3D0' }],
        },
        {
          num: '04', bg: '#C084FC', color: '#fff',
          title: 'FACT-CHECK & CONCLUDE',
          body: 'Every claim is audited: Supported, Unsupported, or Unverifiable — producing the final reliable answer.',
          avatars: [{ bg: '#fff', initial: 'F', color: '#C084FC' }],
        },
      ];
      return (
        <section style={{ background: '#1E1B4B', borderBottom: '4px solid #111', padding: '16px 80px 80px' }}>
          <h2 style={{ fontFamily: 'Bangers, cursive', fontSize: 48, color: '#F5F0E8', textAlign: 'center', marginBottom: 40 }}>HOW WE DO IT</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 20 }}>
            {steps.map(s => (
              <div key={s.num} style={{
                background: s.bg, border: '4px solid #111', boxShadow: '8px 8px 0 0 #111',
                padding: '28px 24px', display: 'flex', flexDirection: 'column', gap: 12,
              }}>
                <div style={{ display: 'flex' }}>
                  {s.avatars.map((a, i) => (
                    <div key={i} style={{ marginLeft: i > 0 ? -10 : 0, zIndex: s.avatars.length - i }}>
                      <AgentAvatar bg={a.bg} initial={a.initial} color={a.color} />
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily: 'Bangers, cursive', fontSize: 64, color: 'rgba(0,0,0,0.1)', lineHeight: 1 }}>{s.num}</div>
                <div style={{ fontFamily: 'Bangers, cursive', fontSize: 22, color: s.color }}>{s.title}</div>
                <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.6, color: s.color, opacity: 0.8 }}>{s.body}</div>
              </div>
            ))}
          </div>
        </section>
      );
    };

    const StatsBar = () => {
      const [started, setStarted] = React.useState(false);
      const [n1, setN1] = React.useState(0);
      const [n2, setN2] = React.useState(0);
      const [out, setOut] = React.useState('_');
      const [json, setJson] = React.useState('_');
      const ref = React.useRef(null);

      React.useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setStarted(true); obs.disconnect(); } }, { threshold: 0.5 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);

      React.useEffect(() => {
        if (!started) return;
        const start = performance.now();
        const tick = now => {
          const p = Math.min((now - start) / 800, 1);
          setN1(Math.round(4 * p));
          setN2(Math.round(3 * p));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        const reveal = (str, setter) => {
          let i = 0;
          const iv = setInterval(() => { i++; setter(str.slice(0, i)); if (i >= str.length) clearInterval(iv); }, 120);
        };
        reveal('OUT',  setOut);
        setTimeout(() => reveal('JSON', setJson), 200);
      }, [started]);

      const stats = [
        { val: n1 || '0', label: 'SPECIALIZED AGENTS' },
        { val: n2 || '0', label: 'DEBATE ROUNDS' },
        { val: out,  label: 'TRANSCRIPT · VERDICT · SCORES' },
        { val: json, label: 'STRUCTURED OUTPUT' },
      ];
      return (
        <section ref={ref} style={{
          background: '#111', borderTop: '4px solid #111', borderBottom: '4px solid #111',
          padding: '40px 80px', display: 'flex', alignItems: 'center', justifyContent: 'space-around',
        }}>
          {stats.map((s, i) => (
            <React.Fragment key={i}>
              {i > 0 && <div style={{ width: 1, height: 64, background: 'rgba(255,255,255,0.15)' }} />}
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontFamily: 'Bangers, cursive', fontSize: 80, color: '#06B6D4', lineHeight: 1, minWidth: 80 }}>{s.val}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#F5F0E8', letterSpacing: '0.15em', marginTop: 4, textTransform: 'uppercase' }}>{s.label}</div>
              </div>
            </React.Fragment>
          ))}
        </section>
      );
    };

    const LaunchSection = ({ onOpen }) => (
      <section style={{ background: '#06B6D4', borderBottom: '4px solid #111', padding: '80px 80px', textAlign: 'center' }}>
        <h2 style={{ fontFamily: 'Bangers, cursive', fontSize: 58, color: '#fff', marginBottom: 20 }}>LAUNCH A DEBATE IN SECONDS.</h2>
        <div style={{
          background: 'rgba(255,255,255,0.15)', border: '4px solid rgba(255,255,255,0.4)',
          padding: '24px 28px', maxWidth: 520, margin: '0 auto 36px',
          fontSize: 16, fontWeight: 500, lineHeight: 1.65, color: '#fff',
        }}>
          One topic. One click. Four agents argue, analyse, and fact-check — you get a full structured transcript with a reliable, balanced conclusion.
        </div>
        <BrutalButton variant="danger" size="lg" label="SUBMIT YOUR TOPIC" onClick={onOpen}
          style={{ background: '#1E1B4B', color: '#06B6D4' }} />
      </section>
    );

    const AgentRoster = ({ debateActive = false }) => {
      const agents = [
        { num: '01', name: 'PROPONENT',    role: 'CASE BUILDER',     quote: 'Structure the argument. Build the strongest possible case before the Critic speaks.',  bg: '#06B6D4', color: '#fff' },
        { num: '02', name: 'CRITIC',       role: 'ATTACK LEAD',      quote: 'Quote the claim. Expose the flaw. No mercy for weak reasoning.',                        bg: '#1E1B4B', color: '#06B6D4' },
        { num: '03', name: 'ANALYST',      role: 'NEUTRAL OBSERVER', quote: 'Both sides have merit. My job is to find the gap and surface what neither side said.',   bg: '#A7F3D0', color: '#111' },
        { num: '04', name: 'FACT-CHECKER', role: 'EVIDENCE AUDITOR', quote: 'SUPPORTED. UNSUPPORTED. UNVERIFIABLE. Every claim gets a verdict — no exceptions.',      bg: '#C084FC', color: '#fff' },
      ];
      return (
        <section id="agent-roster" style={{ background: '#F5F0E8', borderBottom: '4px solid #111', padding: '80px 80px', position: 'relative', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', right: -40, bottom: -60,
            fontFamily: 'Bangers, cursive', fontSize: '20rem', color: 'rgba(6,182,212,0.07)',
            userSelect: 'none', pointerEvents: 'none', lineHeight: 1,
          }}>ARGUE</div>

          <div style={{ position: 'relative', zIndex: 2 }}>
            <div style={{
              background: '#06B6D4', border: '4px solid #111', boxShadow: '4px 4px 0 0 #111',
              display: 'inline-block', padding: '6px 16px', marginBottom: 16,
            }}>
              <span style={{ fontFamily: 'Bangers, cursive', fontSize: 14, letterSpacing: '0.15em', color: '#fff' }}>AGENT ROSTER</span>
            </div>
            <h2 style={{ fontFamily: 'Bangers, cursive', fontSize: 72, color: '#111', lineHeight: 1, marginBottom: 8 }}>WORKLOAD & ALLOCATION</h2>
            <p style={{ fontSize: 15, fontWeight: 500, color: 'rgba(0,0,0,0.55)', marginBottom: 8 }}>Each agent has a distinct role in the debate pipeline.</p>
            <p style={{ fontFamily: 'Bangers, cursive', fontSize: 28, fontStyle: 'italic', color: '#1E1B4B', marginBottom: 48 }}>"Argue clearly first. Then verify cleanly."</p>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 20 }}>
              {agents.map(a => (
                <div key={a.num}
                  style={{
                    background: a.bg, border: '4px solid #111', boxShadow: '8px 8px 0 0 #111',
                    display: 'flex', flexDirection: 'column', position: 'relative',
                    transition: 'all 100ms', cursor: 'default', overflow: 'hidden',
                  }}
                  onMouseEnter={e => { e.currentTarget.style.transform = 'translate(-2px,-2px)'; e.currentTarget.style.boxShadow = '12px 12px 0 0 #111'; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = 'translate(0,0)'; e.currentTarget.style.boxShadow = '8px 8px 0 0 #111'; }}
                >
                  {/* Dot-grid portrait bar */}
                  <div style={{
                    width: '100%', height: 80, borderBottom: '4px solid #111',
                    display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 8, padding: '14px 16px',
                  }}>
                    {Array(25).fill(0).map((_, i) => (
                      <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: a.color === '#fff' ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.15)' }} />
                    ))}
                  </div>
                  <div style={{ padding: '18px 24px 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <div style={{
                      position: 'absolute', top: 88, right: 16,
                      fontFamily: 'Bangers, cursive', fontSize: 56,
                      color: a.color === '#fff' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)',
                      lineHeight: 1, userSelect: 'none',
                    }}>{a.num}</div>
                    <div style={{ fontFamily: 'Bangers, cursive', fontSize: 26, color: a.color }}>{a.name}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', color: a.color, opacity: 0.6, textTransform: 'uppercase' }}>{a.role}</div>
                    <div style={{
                      fontSize: 13, fontWeight: 500, fontStyle: 'italic', lineHeight: 1.55,
                      borderTop: `2px solid ${a.color === '#fff' ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)'}`,
                      paddingTop: 10, marginTop: 4, color: a.color, opacity: 0.85,
                    }}>"{a.quote}"</div>
                    <div style={{
                      display: 'inline-flex', alignItems: 'center', gap: 6,
                      background: debateActive ? '#06B6D4' : 'transparent',
                      border: `2px solid ${a.color === '#fff' ? 'rgba(255,255,255,0.4)' : '#111'}`,
                      color: debateActive ? '#fff' : a.color,
                      padding: '3px 10px', fontSize: 11, fontWeight: 700, textTransform: 'uppercase',
                      letterSpacing: '0.08em', alignSelf: 'flex-start', marginTop: 4,
                      animation: debateActive ? 'pulse 1.5s infinite' : 'none',
                    }}>
                      {debateActive ? '● ACTIVE' : '○ IDLE'}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // ─── Wizard Modal ─────────────────────────────────────────────────────────────

    const WizardAvatar = () => (
      <div style={{
        width: 48, height: 48, background: '#06B6D4', border: '2px solid #111',
        display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 2, padding: 8, flexShrink: 0,
      }}>
        {Array(9).fill(0).map((_, i) => (
          <div key={i} style={{ background: i % 2 === 0 ? '#fff' : 'transparent', borderRadius: 1 }} />
        ))}
      </div>
    );

    const QUICK_FILLS = [
      { label: 'AI & SOCIETY', topic: 'AI will do more harm than good to society' },
      { label: 'TECH',         topic: 'Remote work is better than office work' },
      { label: 'ETHICS',       topic: 'Privacy is more important than security' },
    ];

    const StepTopic = ({ state, setState }) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
          <WizardAvatar />
          <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.5, paddingTop: 6 }}>
            Quick ask: <em>"What do you want to debate?"</em>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 8 }}>TOPIC</div>
          <textarea
            value={state.topic}
            onChange={e => setState(s => ({ ...s, topic: e.target.value }))}
            maxLength={200} rows={3}
            placeholder="e.g. AI should replace human judges in courtrooms"
            style={{
              width: '100%', border: '4px solid #111', background: '#F5F0E8',
              padding: '12px 14px', fontSize: 15, fontWeight: 500, resize: 'none',
              outline: 'none', boxSizing: 'border-box',
            }}
            onFocus={e => e.target.style.background = '#E0F7FA'}
            onBlur={e => e.target.style.background = '#F5F0E8'}
          />
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 10 }}>
            {QUICK_FILLS.map(q => (
              <button key={q.label} onClick={() => setState(s => ({ ...s, topic: q.topic }))}
                style={{
                  border: '2px solid #111', padding: '5px 12px', fontSize: 12, fontWeight: 700,
                  textTransform: 'uppercase', letterSpacing: '0.05em',
                  background: state.topic === q.topic ? '#06B6D4' : '#F5F0E8',
                  color: state.topic === q.topic ? '#fff' : '#111',
                  cursor: 'pointer',
                }}
              >{q.label}</button>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 8 }}>
          <BrutalButton
            variant="primary" label="CONTINUE →"
            onClick={() => setState(s => ({ ...s, step: 2 }))}
            disabled={state.topic.trim().length <= 10}
          />
        </div>
      </div>
    );

    const StepRounds = ({ state, setState }) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
          <WizardAvatar />
          <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.5, paddingTop: 6 }}>
            Quick ask: <em>"How many rounds should they debate?"</em>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 16 }}>ROUNDS (1–5)</div>
          <div style={{ display: 'flex', gap: 12 }}>
            {[1, 2, 3, 4, 5].map(n => (
              <button key={n} onClick={() => setState(s => ({ ...s, rounds: n }))}
                style={{
                  width: 52, height: 52, border: '4px solid #111',
                  fontFamily: 'Bangers, cursive', fontSize: 26,
                  background: state.rounds === n ? '#06B6D4' : '#F5F0E8',
                  color: state.rounds === n ? '#fff' : '#111',
                  cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: state.rounds === n ? '4px 4px 0 0 #111' : 'none',
                }}
              >{n}</button>
            ))}
          </div>
          <div style={{ fontSize: 12, color: '#666', marginTop: 12 }}>More rounds = deeper debate + longer processing time.</div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8 }}>
          <BrutalButton variant="secondary" label="← BACK" onClick={() => setState(s => ({ ...s, step: 1 }))} />
          <BrutalButton variant="primary"   label="CONTINUE →" onClick={() => setState(s => ({ ...s, step: 3 }))} />
        </div>
      </div>
    );

    const StepReview = ({ state, setState, onSubmit }) => {
      const rows = [
        { label: 'TOPIC',  strip: '#06B6D4', value: state.topic },
        { label: 'ROUNDS', strip: '#1E1B4B', value: state.rounds },
        { label: 'AGENTS', strip: '#C084FC', value: '4 (Proponent · Critic · Analyst · Fact-Checker)' },
        { label: 'MODEL',  strip: '#111',    value: 'GPT-4o-mini' },
      ];
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <h3 style={{ fontFamily: 'Bangers, cursive', fontSize: 32, margin: 0 }}>REVIEW</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {rows.map(r => (
              <div key={r.label} style={{
                border: '4px solid #111', boxShadow: '4px 4px 0 0 #111',
                display: 'flex', alignItems: 'stretch', background: '#fff', overflow: 'hidden',
              }}>
                <div style={{ width: 6, background: r.strip, flexShrink: 0 }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '12px 16px', flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(0,0,0,0.45)', width: 72, flexShrink: 0 }}>{r.label}</div>
                  <div style={{ fontFamily: 'Bangers, cursive', fontSize: 18, color: '#111', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.value}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
            <BrutalButton variant="secondary" label="← BACK" onClick={() => setState(s => ({ ...s, step: 2 }))} />
            <BrutalButton variant="primary" size="lg" label="LAUNCH DEBATE →" onClick={() => onSubmit({ topic: state.topic, rounds: state.rounds })} />
          </div>
        </div>
      );
    };

    const BriefTerminal = ({ onClose, onSubmit, initialTopic = '' }) => {
      const [state, setState] = React.useState({ topic: initialTopic, rounds: 3, step: 1 });
      React.useEffect(() => { if (initialTopic) setState(s => ({ ...s, topic: initialTopic })); }, [initialTopic]);

      return (
        <div
          style={{ position: 'fixed', inset: 0, background: 'rgba(30,27,75,0.92)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}
        >
          <div style={{ background: '#F5F0E8', border: '4px solid #111', boxShadow: '12px 12px 0 0 #111', width: '100%', maxWidth: 520, overflow: 'hidden' }}>
            <div style={{ background: '#06B6D4', borderBottom: '4px solid #111', padding: '14px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontFamily: 'Bangers, cursive', fontSize: 24, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#fff' }}>
                DEBATE TERMINAL
              </span>
              <div style={{ textAlign: 'right' }}>
                <div style={{ background: '#1E1B4B', color: '#06B6D4', fontSize: 11, fontWeight: 700, padding: '2px 8px', display: 'inline-block' }}>
                  STEP {state.step}/3
                </div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', marginTop: 2 }}>INTAKE WIZARD</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 6, padding: '16px 24px 0' }}>
              {[1, 2, 3].map(n => (
                <div key={n} style={{ flex: 1, height: 8, border: '2px solid #111', background: state.step >= n ? '#06B6D4' : '#F5F0E8', transition: 'background 200ms' }} />
              ))}
            </div>
            <div style={{ padding: '24px' }}>
              {state.step === 1 && <StepTopic   state={state} setState={setState} />}
              {state.step === 2 && <StepRounds  state={state} setState={setState} />}
              {state.step === 3 && <StepReview  state={state} setState={setState} onSubmit={onSubmit} />}
            </div>
          </div>
        </div>
      );
    };

    // ─── Debate View ──────────────────────────────────────────────────────────────

    const PIPELINE = [
      { label: 'PROPONENT',    status: 'Proponent is building the case…',          bg: '#06B6D4', color: '#fff' },
      { label: 'CRITIC',       status: 'Critic is reading the arguments…',          bg: '#1E1B4B', color: '#06B6D4' },
      { label: 'ANALYST',      status: 'Analyst is evaluating both sides…',         bg: '#A7F3D0', color: '#111' },
      { label: 'FACT-CHECKER', status: 'Fact-checker is auditing every claim…',     bg: '#C084FC', color: '#fff' },
    ];

    const LoadingView = ({ topic }) => {
      const [idx, setIdx] = React.useState(0);
      const [visible, setVisible] = React.useState(true);

      React.useEffect(() => {
        const iv = setInterval(() => {
          setVisible(false);
          setTimeout(() => { setIdx(i => (i + 1) % PIPELINE.length); setVisible(true); }, 500);
        }, 2500);
        return () => clearInterval(iv);
      }, []);

      return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '70vh', padding: 32 }}>
          <div style={{
            background: '#1E1B4B', border: '4px solid #111', boxShadow: '16px 16px 0 0 #111',
            padding: '48px 40px', maxWidth: 600, width: '100%', textAlign: 'center',
          }}>
            <div style={{ fontFamily: 'Bangers, cursive', fontSize: 40, color: '#06B6D4', marginBottom: 24 }}>DEBATE IN PROGRESS</div>
            <div style={{ background: 'rgba(255,255,255,0.08)', border: '4px solid rgba(255,255,255,0.15)', padding: '16px 20px', marginBottom: 32, fontSize: 16, fontWeight: 500, color: '#F5F0E8' }}>
              {topic}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, gap: 0 }}>
              {PIPELINE.map((a, i) => (
                <React.Fragment key={a.label}>
                  <div style={{
                    padding: '8px 14px', border: '3px solid #111',
                    fontFamily: 'Bangers, cursive', fontSize: 12, letterSpacing: '0.08em', textTransform: 'uppercase',
                    background: i === idx ? a.bg : 'rgba(255,255,255,0.08)',
                    color: i === idx ? a.color : 'rgba(255,255,255,0.5)',
                    boxShadow: i === idx ? '4px 4px 0 0 #111' : 'none',
                    transition: 'all 300ms', whiteSpace: 'nowrap',
                  }}>{a.label}</div>
                  {i < PIPELINE.length - 1 && <div style={{ width: 16, height: 3, background: 'rgba(255,255,255,0.2)', flexShrink: 0 }} />}
                </React.Fragment>
              ))}
            </div>
            <div style={{
              background: 'rgba(6,182,212,0.15)', border: '3px solid #06B6D4',
              padding: '14px 20px', fontSize: 14, fontWeight: 600, color: '#06B6D4',
              opacity: visible ? 1 : 0, transition: 'opacity 500ms',
            }}>
              {PIPELINE[idx].status}
            </div>
          </div>
        </div>
      );
    };

    const DebateStream = ({ messages, topic }) => {
      const [visibleCount, setVisibleCount] = React.useState(0);

      React.useEffect(() => {
        setVisibleCount(0);
        const iv = setInterval(() => {
          setVisibleCount(c => { if (c >= messages.length) { clearInterval(iv); return c; } return c + 1; });
        }, 600);
        return () => clearInterval(iv);
      }, [messages]);

      const rounds = [...new Set(messages.map(m => m.round))];

      return (
        <div style={{ maxWidth: 720, margin: '0 auto', padding: '48px 32px' }}>
          <div style={{
            background: '#1E1B4B', border: '4px solid #111', boxShadow: '8px 8px 0 0 #111',
            padding: '24px 28px', marginBottom: 48, display: 'flex', alignItems: 'center', gap: 16,
          }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#06B6D4', animation: 'pulse 2s infinite', flexShrink: 0 }} />
            <div style={{ fontFamily: 'Bangers, cursive', fontSize: 28, color: '#06B6D4' }}>DEBATING:</div>
            <div style={{ fontFamily: 'Bangers, cursive', fontSize: 22, color: '#F5F0E8', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {topic.toUpperCase()}
            </div>
          </div>

          {rounds.map(r => {
            const roundMsgs = messages.filter(m => m.round === r);
            return (
              <div key={r}>
                <div style={{
                  fontFamily: 'Bangers, cursive', fontSize: 32, color: '#111',
                  borderBottom: '4px solid #111', paddingBottom: 8, marginBottom: 24, marginTop: 40,
                  display: 'flex', alignItems: 'center', gap: 12,
                }}>
                  <span style={{ background: '#06B6D4', color: '#fff', padding: '2px 14px', fontSize: 28 }}>
                    {r === 0 ? 'OPENING STATEMENT' : `ROUND ${r}`}
                  </span>
                </div>
                {roundMsgs.map((msg, i) => {
                  const globalIdx = messages.indexOf(msg);
                  return <MessageCard key={i} message={msg} visible={globalIdx < visibleCount} />;
                })}
              </div>
            );
          })}
        </div>
      );
    };

    const SummaryCard = ({ messages, topic, onNewDebate }) => {
      const [copied, setCopied] = React.useState(false);

      const fcMsg = messages.filter(m => m.role === 'fact_checker').slice(-1)[0];
      const maxRound = Math.max(...messages.map(m => m.round));
      const agentCount = new Set(messages.map(m => m.role)).size;

      const handleCopy = () => {
        const lines = [`ARGUMIND DEBATE TRANSCRIPT`, `Topic: ${topic}`, `Date: ${new Date().toLocaleDateString()}`, ''];
        const byRound = {};
        messages.forEach(m => { if (!byRound[m.round]) byRound[m.round] = []; byRound[m.round].push(m); });
        Object.keys(byRound).sort((a, b) => Number(a) - Number(b)).forEach(r => {
          lines.push(`--- ${Number(r) === 0 ? 'OPENING' : `ROUND ${r}`} ---`);
          byRound[r].forEach(m => { lines.push(`[${m.role.toUpperCase()}]: ${m.content}`); lines.push(''); });
        });
        navigator.clipboard.writeText(lines.join('\n')).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
      };

      return (
        <div style={{
          background: '#1E1B4B', border: '4px solid #111', boxShadow: '16px 16px 0 0 #111',
          padding: 36, maxWidth: 720, margin: '8px auto 80px',
        }}>
          <div style={{ fontFamily: 'Bangers, cursive', fontSize: 40, color: '#06B6D4', marginBottom: 24 }}>DEBATE COMPLETE</div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14, marginBottom: 28 }}>
            {[
              { label: 'TOTAL MESSAGES', val: messages.length },
              { label: 'ROUNDS',         val: maxRound },
              { label: 'AGENTS ACTIVE',  val: agentCount },
            ].map(s => (
              <div key={s.label} style={{
                background: '#F5F0E8', border: '4px solid #111', boxShadow: '4px 4px 0 0 #111',
                padding: '20px 16px', textAlign: 'center',
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.15em', color: 'rgba(0,0,0,0.45)', textTransform: 'uppercase', marginBottom: 8 }}>{s.label}</div>
                <div style={{ fontFamily: 'Bangers, cursive', fontSize: 56, color: '#1E1B4B', lineHeight: 1 }}>{s.val}</div>
              </div>
            ))}
          </div>

          {fcMsg && (
            <div style={{
              background: 'rgba(192,132,252,0.15)', border: '4px solid #C084FC',
              padding: '22px 24px', marginBottom: 28,
            }}>
              <div style={{ fontFamily: 'Bangers, cursive', fontSize: 18, color: '#C084FC', marginBottom: 12, letterSpacing: '0.1em' }}>
                FACT-CHECKER FINAL AUDIT
              </div>
              <div style={{ fontSize: 14, color: '#F5F0E8', lineHeight: 1.75, whiteSpace: 'pre-wrap' }}>{fcMsg.content}</div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 16, justifyContent: 'center' }}>
            <BrutalButton variant="primary" size="lg" label="NEW DEBATE →" onClick={onNewDebate} />
            <BrutalButton variant="secondary" label={copied ? '✓ COPIED!' : 'COPY TRANSCRIPT'} onClick={handleCopy} />
          </div>
        </div>
      );
    };

    const DebateView = ({ topic, rounds, onBack }) => {
      const [status, setStatus]         = React.useState('loading');
      const [transcript, setTranscript] = React.useState(null);
      const [error, setError]           = React.useState('');

      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          setStatus('loading');
          try {
            const res = await fetch(`${BACKEND}/debate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ topic, rounds }),
            });
            if (!res.ok) { const t = await res.text(); throw new Error(`Server error (${res.status}): ${t}`); }
            const data = await res.json();
            if (!cancelled) { setTranscript(data); setStatus('success'); }
          } catch (e) {
            if (!cancelled) { setError(e.message); setStatus('error'); }
          }
        })();
        return () => { cancelled = true; };
      }, [topic, rounds]);

      if (status === 'loading') return <LoadingView topic={topic} />;

      if (status === 'error') return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '60vh', padding: 32 }}>
          <div style={{ background: '#06B6D4', border: '4px solid #111', boxShadow: '8px 8px 0 0 #111', padding: 36, maxWidth: 520, textAlign: 'center' }}>
            <div style={{ fontFamily: 'Bangers, cursive', fontSize: 32, marginBottom: 16, color: '#fff' }}>DEBATE FAILED</div>
            <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 16, fontFamily: 'monospace', background: '#fff', border: '2px solid #111', padding: 12, textAlign: 'left' }}>{error}</div>
            <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.9)', marginBottom: 24, lineHeight: 1.6 }}>
              Make sure the backend is running:<br />
              <code style={{ background: 'rgba(0,0,0,0.2)', padding: '4px 8px', display: 'inline-block', marginTop: 8 }}>
                cd backend &amp;&amp; uvicorn main:app --reload
              </code>
            </div>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <BrutalButton variant="danger" label="TRY AGAIN" onClick={() => setStatus('loading')} style={{ background: '#1E1B4B', color: '#fff' }} />
              <BrutalButton variant="secondary" label="← BACK" onClick={onBack} />
            </div>
          </div>
        </div>
      );

      return (
        <div style={{ background: '#F5F0E8', minHeight: '100vh' }}>
          <DebateStream messages={transcript.messages} topic={transcript.topic} />
          <SummaryCard messages={transcript.messages} topic={transcript.topic} onNewDebate={onBack} />
        </div>
      );
    };

    // ─── Landing page ─────────────────────────────────────────────────────────────

    const LandingPage = ({ onStartDebate }) => {
      const [wizardOpen, setWizardOpen]     = React.useState(false);
      const [initialTopic, setInitialTopic] = React.useState('');

      const openWith = (topic = '') => { setInitialTopic(topic); setWizardOpen(true); };

      return (
        <div style={{ background: '#F5F0E8' }}>
          <HeroSection onOpen={() => openWith()} />
          <Ticker onQuickTopic={t => openWith(t)} />
          <PromptDebateShip />
          <HowWeDoIt />
          <StatsBar />
          <LaunchSection onOpen={() => openWith()} />
          <AgentRoster />
          {wizardOpen && (
            <BriefTerminal
              initialTopic={initialTopic}
              onClose={() => setWizardOpen(false)}
              onSubmit={({ topic, rounds }) => { setWizardOpen(false); onStartDebate(topic, rounds); }}
            />
          )}
        </div>
      );
    };

    // ─── Footer ───────────────────────────────────────────────────────────────────

    const Footer = () => (
      <footer style={{
        background: '#111', borderTop: '4px solid #111',
        padding: '32px 80px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <BrainIcon size={32} />
          <span style={{ fontFamily: 'Bangers, cursive', fontSize: 22, fontStyle: 'italic', color: '#F5F0E8', letterSpacing: '0.05em' }}>ARGUMIND</span>
        </div>
        <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
          4 AI Agents · Debate · Fact-Check · Reliable Answers
        </div>
      </footer>
    );

    // ─── App root ─────────────────────────────────────────────────────────────────

    const App = () => {
      const [page, setPage]             = React.useState('landing');
      const [debateParams, setDebate]   = React.useState(null);

      const startDebate = (topic, rounds) => {
        setDebate({ topic, rounds });
        setPage('debate');
        window.scrollTo({ top: 0 });
      };
      const backToLanding = () => {
        setPage('landing');
        setDebate(null);
        window.scrollTo({ top: 0 });
      };

      return (
        <div>
          <AppHeader onBack={page === 'debate' ? backToLanding : null} />
          {page === 'landing' && <LandingPage onStartDebate={startDebate} />}
          {page === 'debate' && debateParams && (
            <DebateView topic={debateParams.topic} rounds={debateParams.rounds} onBack={backToLanding} />
          )}
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
